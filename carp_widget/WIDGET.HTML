<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Widget del Clima</title> 
    <style>

        .boton-volver {
            display: inline-block;
            background-color: #0f7ee6;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            margin: 20px;
            transition: background-color 0.3s;
            font-family: Arial, sans-serif;
        }

        .boton-volver:hover {
            background-color: #0c67bd;
        }

  
        .weather-card { 
            width: 220px; 
            margin: 50px auto; 
            padding: 20px; 
            border: 2px solid #ccc; 
            border-radius: 12px; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            background-color: #f5f5f5; 
        } 
        
        .city { 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        } 
        
        .icon { 
            font-size: 40px; 
            margin: 10px 0; 
        } 
        
        .temperature { 
            font-size: 28px; 
            font-weight: bold; 
        } 
        
        .condition { 
            font-size: 16px; 
            color: #555; 
        } 
    </style> 
</head> 
<body> 

    <a href="../index.html" class="boton-volver">&larr; Volver Inicio</a>

    <div class="weather-card"> 
        <div class="city">San Gil</div> 
        <div class="icon">☀️</div> 
        <div class="temperature">28°C</div> 
        <div class="condition">Soleado</div> 
    </div> 

</body> 
</html>
